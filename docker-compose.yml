version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fairshare-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # To use AWS RDS MySQL instead of local SQLite fallback, uncomment the line below and update the URL:
      # - DATABASE_URL=mysql://admin:yourpassword@your-rds-host.amazonaws.com:3306/shared_expenses

  frontend:
    build: ./frontend
    container_name: fairshare-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
